<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackSphere - تتبع عاداتك</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dark-mode.css" />
</head>
<body>

    <!-- ====== SPLASH SCREEN (شاشة البداية) ====== -->
<div id="splash-screen" class="splash-screen">
    <div class="splash-content">
    <div class="splash-logo">
        <i class="fas fa-chart-line"></i>
        <span>Track<span>Sphere</span></span>
    </div>
    <p class="splash-subtitle" data-i18n="splash_title">تتبع عاداتك اليومية</p>

    <div class="splash-buttons">
        <button id="splash-start" class="splash-btn primary" data-i18n="splash_start">
            <i class="fas fa-play"></i> ابدأ
        </button>
        <button id="splash-settings" class="splash-btn secondary" data-i18n="splash_settings">
            <i class="fas fa-cog"></i> الإعدادات
        </button>
        <button id="splash-info" class="splash-btn secondary" data-i18n="splash_info">
            <i class="fas fa-info-circle"></i> معلومات
        </button>
        <button id="splash-about" class="splash-btn secondary" data-i18n="splash_about">
            <i class="fas fa-user"></i> عن المطور
        </button>
    </div>

    <div class="splash-footer">
        <span>v1.1</span>
        <span>#Mahdawi_Challenge</span>
    </div>
 </div>
</div>

<!-- ====== SPLASH OVERLAY (مودال info/settings) ====== -->
<div id="splash-modal" class="splash-modal" style="display:none;">
    <div class="splash-modal-content">
        <button class="splash-modal-close" onclick="closeSplashModal()">✕</button>
        <div id="splash-modal-body">
            <!-- المحتوى هيتغير حسب الزر -->
        </div>
    </div>
</div>

    <!-- ====== HEADER ====== -->
<header>
    <div class="container">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
                <span>Track<span>Sphere</span></span>
            </div>
            <div class="header-controls">
                <!-- 👇 زر الإعدادات الجديد -->
                <button id="header-settings" class="btn-settings" title="الإعدادات">
                    <i class="fas fa-cog"></i>
                </button>
                <button id="reset-btn" class="btn-danger" title="حذف جميع البيانات"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </div>
</header>

    <!-- ====== STATS ====== -->
    <section id="stats">
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-calendar-check"></i>
                    <span class="stat-number" id="total-habits">0</span>
                    <span class="stat-label" data-i18n="stats_total_habits">إجمالي العادات</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-fire"></i>
                    <span class="stat-number" id="total-streak">0</span>
                    <span class="stat-label" data-i18n="stats_best_streak">أطول سلسلة</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-percent"></i>
                    <span class="stat-number" id="completion-rate">0%</span>
                    <span class="stat-label" data-i18n="stats_completion">نسبة الإنجاز</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-star"></i>
                    <span class="stat-number" id="total-points">0</span>
                    <span class="stat-label" data-i18n="stats_points">النقاط</span>
                </div>
            </div>
        </div>
    </section>

    <!-- ====== ADD HABIT ====== -->
    <section id="add-habit">
        <div class="container">
            <div class="add-habit-wrapper">
                <div class="add-habit-input-group">
                    <input type="text" id="habit-input" placeholder="أضف عادة جديدة..." />
                    <select id="habit-category">
                        <option value="صحية">💪 صحية</option>
                        <option value="تعليمية">📚 تعليمية</option>
                        <option value="روحية">🕌 روحية</option>
                        <option value="رياضية">⚽ رياضية</option>
                        <option value="أخرى">✨ أخرى</option>
                    </select>
                </div>
                <button id="add-btn"><i class="fas fa-plus"></i> أضف</button>
            </div>
        </div>
    </section>

    <!-- ====== HABITS LIST ====== -->
    <section id="habits">
        <div class="container">
            <div class="habits-header">
                <h2><i class="fas fa-list"></i> عاداتي اليومية</h2>
                <span id="today-date"></span>
            </div>
            <div id="habits-list" class="habits-grid"></div>
        </div>
    </section>

    <!-- ====== CHART SECTION ====== -->
    <section id="chart-section">
        <div class="container">
            <div class="chart-header">
                <div>
                    <h2><i class="fas fa-chart-bar"></i> تقدمك</h2>
                    <span id="chart-range-info" class="chart-range-info">📅 الأسبوع: ...</span>
                </div>
                <div class="chart-controls">
                    <div class="chart-filters">
                        <button class="chart-filter-btn active" data-filter="weekly" onclick="switchChartFilter('weekly')">
                            <i class="fas fa-calendar-week"></i> أسبوعي
                        </button>
                        <button class="chart-filter-btn" data-filter="monthly" onclick="switchChartFilter('monthly')">
                            <i class="fas fa-calendar-alt"></i> شهري
                        </button>
                    </div>
                    <div class="chart-nav">
                        <button class="chart-nav-btn chart-nav-prev" onclick="navigateChart(-1)"><i class="fas fa-chevron-right"></i></button>
                        <button class="chart-nav-btn chart-nav-today" onclick="resetChartToToday()" style="display:none;"><i class="fas fa-dot-circle"></i></button>
                        <button class="chart-nav-btn chart-nav-next" onclick="navigateChart(1)"><i class="fas fa-chevron-left"></i></button>
                        <button class="chart-nav-btn" onclick="exportChartAsImage()"><i class="fas fa-download"></i></button>
                    </div>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="weekly-chart"></canvas>
            </div>
        </div>
    </section>

    <!-- ====== ACHIEVEMENTS ====== -->
    <section id="achievements">
        <div class="container">
            <h2><i class="fas fa-trophy"></i> الإنجازات</h2>
            <div id="achievements-list" class="achievements-grid"></div>
        </div>
    </section>

    <!-- ====== SHARE SECTION ====== -->
    <section id="share-section">
        <div class="container">
            <div class="share-wrapper">
                <h3><i class="fas fa-share-alt"></i> شارك تقدمك</h3>
                <p>شارك إنجازاتك مع أصحابك وحفزهم!</p>
                <div class="share-buttons">
                    <button onclick="shareProgress('whatsapp')" class="share-btn whatsapp"><i class="fab fa-whatsapp"></i> واتساب</button>
                    <button onclick="shareProgress('instagram')" class="share-btn instagram"><i class="fab fa-instagram"></i> ستوري</button>
                    <button onclick="shareProgress('tiktok')" class="share-btn tiktok"><i class="fab fa-tiktok"></i> تيك توك</button>
                    <button onclick="shareProgress('image')" class="share-btn image"><i class="fas fa-image"></i> صورة</button>
                </div>
                <div id="share-preview" class="share-preview" style="display:none;"></div>
            </div>
        </div>
    </section>

    <!-- ====== FOOTER ====== -->
    <footer>
        <div class="container">
            <p>© 2026 TrackSphere - Made with ❤️ by Mahdi Ahmed</p>
            <p style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px;">
                <span style="color:#6C63FF;">#Mahdawi_Challenge</span>
            </p>
        </div>
    </footer>

    <!-- ====== SCRIPTS ====== -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="js/language.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/habits.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/gamification.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
